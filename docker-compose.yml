services:
  openclaw:
    image: ghcr.io/bitxeno/openclaw-docker:latest
    container_name: openclaw
    ports:
      - "${OPENCLAW_GATEWAY_PORT}:18789"
      - "${OPENCLAW_BRIDGE_PORT}:18790"
      - "${OPENCODE_PORT}:4096"
    env_file:
      - .env
    environment:
      TZ: Asia/Shanghai
    volumes:
      - ./.openclaw:/root/.openclaw
      - ./.config:/root/.config
    restart: unless-stopped
    networks:
      - openclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${OPENCLAW_GATEWAY_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  openclaw-network:
    driver: bridge
